<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - ElectricianTasksAI</title>
  <meta name="description" content="Reset your ElectricianTasksAI account password.">
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --accent: #EAB308; }
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; background: #fafbfc; color: #1a1a2e; line-height: 1.6; min-height: 100vh; }
    main { max-width: 520px; margin: 0 auto; padding: 56px 24px; }
    .card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    h1 { font-size: 1.75rem; margin-bottom: 8px; text-align: center; }
    .subtitle { color: #374151; text-align: center; margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; }
    input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem; font-family: inherit; }
    input:focus { outline: none; border-color: var(--accent); }
    .btn { width: 100%; padding: 14px 24px; background: var(--accent); color: #fff; border: 0; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 16px; font-family: inherit; }
    .btn.secondary { background: #e5e7eb; color: #111827; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .message { padding: 14px 16px; border-radius: 8px; margin-top: 16px; display: none; }
    .message.success { display: block; background: #ecfdf5; border: 1px solid #10b981; color: #065f46; }
    .message.error { display: block; background: #fef2f2; border: 1px solid #ef4444; color: #991b1b; }
    .link-row { text-align: center; margin-top: 18px; font-size: 0.92rem; color: #6b7280; }
    .link-row a { color: var(--accent); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
<div id="site-header"></div>
<script src="/header.js"></script>

<main>
  <div class="card" id="request-card">
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your account email and we'll send a password reset link.</p>
    <label for="reset-email">Email Address</label>
    <input type="email" id="reset-email" placeholder="you@example.com" autocomplete="email">
    <button class="btn" type="button" onclick="requestReset(this)">Send Reset Link</button>
    <div id="request-message" class="message"></div>
    <p class="link-row"><a href="/download.html">Back to login</a></p>
  </div>

  <div class="card" id="confirm-card" style="display:none;">
    <h1>Choose New Password</h1>
    <p class="subtitle">Use at least 8 characters.</p>
    <label for="new-password">New Password</label>
    <input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password">
    <label for="confirm-password" style="margin-top:14px;">Confirm Password</label>
    <input type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password">
    <button class="btn" type="button" onclick="confirmReset(this)">Update Password</button>
    <div id="confirm-message" class="message"></div>
  </div>
</main>

<script>
  const API_BASE = 'https://api.lawtasksai.com';
  const PRODUCT_ID = 'electrician';
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (token) {
    document.getElementById('request-card').style.display = 'none';
    document.getElementById('confirm-card').style.display = 'block';
  }

  function setMessage(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'message ' + type;
  }

  async function requestReset(btn) {
    const email = document.getElementById('reset-email').value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setMessage('request-message', 'Please enter a valid email address.', 'error');
      return;
    }
    btn.disabled = true; btn.textContent = 'Sending...';
    try {
      const res = await fetch(`${API_BASE}/auth/password-reset/request?product=${encodeURIComponent(PRODUCT_ID)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Product-ID': PRODUCT_ID },
        body: JSON.stringify({ email })
      });
      if (!res.ok) throw new Error('reset unavailable');
      setMessage('request-message', 'If that email is on an account, a reset link has been sent. Please check your inbox.', 'success');
    } catch (e) {
      setMessage('request-message', 'We could not send a reset link from this page. Please try again or contact support.', 'error');
    }
    btn.disabled = false; btn.textContent = 'Send Reset Link';
  }

  async function confirmReset(btn) {
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    if (!token) {
      setMessage('confirm-message', 'This reset link is missing a token.', 'error');
      return;
    }
    if (!password || password.length < 8) {
      setMessage('confirm-message', 'Password must be at least 8 characters.', 'error');
      return;
    }
    if (password !== confirm) {
      setMessage('confirm-message', 'Passwords do not match.', 'error');
      return;
    }
    btn.disabled = true; btn.textContent = 'Updating...';
    try {
      const res = await fetch(`${API_BASE}/auth/password-reset/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || 'Could not update password.');
      setMessage('confirm-message', 'Password updated. You can now log in.', 'success');
      setTimeout(() => { window.location.href = '/download.html'; }, 1400);
    } catch (e) {
      setMessage('confirm-message', e.message || 'Could not update password.', 'error');
      btn.disabled = false; btn.textContent = 'Update Password';
    }
  }
</script>
</body>
</html>
