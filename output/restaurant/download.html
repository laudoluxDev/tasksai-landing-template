<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - RestaurantTasksAI</title>
  <meta name="description" content="Access your RestaurantTasksAI account, install from GitHub, and view your credits and purchase history.">
  
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --accent: #DC2626; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; color: #1a1a2e; background: #fafbfc; min-height: 100vh; }
    .container { max-width: 700px; margin: 0 auto; padding: 0 24px; }
    main { padding: 40px 24px; max-width: 700px; margin: 0 auto; }

    /* ── Login card ── */
    .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; }
    h1 { font-size: 1.75rem; margin-bottom: 8px; text-align: center; }
    h2 { font-size: 1.1rem; margin-bottom: 16px; color: #1a1a2e; font-weight: 700; }
    .subtitle { color: #374151; text-align: center; margin-bottom: 24px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab { flex: 1; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; background: white; cursor: pointer; text-align: center; font-weight: 500; color: #374151; transition: all 0.2s; }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, white); color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    label { display: block; font-weight: 500; margin-bottom: 8px; color: #374151; }
    input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; font-family: inherit; }
    input:focus { outline: none; border-color: var(--accent); }
    .input-hint { font-size: 0.9rem; color: #6b7280; margin-top: 6px; }
    .btn { width: 100%; padding: 14px 24px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 16px; font-family: inherit; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .message { padding: 16px; border-radius: 8px; margin-top: 16px; display: none; }
    .message.success { background: #ecfdf5; border: 1px solid #10b981; color: #065f46; display: block; }
    .message.error { background: #fef2f2; border: 1px solid #ef4444; color: #991b1b; display: block; }

    /* ── Dashboard ── */
    #dashboard { display: none; }
    .logout-btn { color: #6b7280; background: none; border: none; cursor: pointer; font-size: 0.85rem; }
    .logout-btn:hover { color: #ef4444; }

    /* ── Vertical cards ── */
    .vertical-card {
      background: white;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07);
      margin-bottom: 20px;
      border: 2px solid #e5e7eb;
    }
    .vertical-card.current {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }
    .vertical-card.other {
      opacity: 0.82;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
      gap: 12px;
    }
    .card-title { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }
    .card-badge {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-current { background: color-mix(in srgb, var(--accent) 12%, white); color: var(--accent); }
    .badge-other { background: #f3f4f6; color: #6b7280; }

    .credits-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .credits-num { font-size: 2rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .credits-label { font-size: 0.88rem; color: #6b7280; }

    .license-box {
      background: #f3f4f6;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .license-key { font-family: monospace; font-size: 0.9rem; color: #1a1a2e; word-break: break-all; }
    .copy-btn {
      padding: 6px 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
      font-family: inherit;
      flex-shrink: 0;
    }
    .copy-btn:hover { opacity: 0.9; }

    /* Current vertical action buttons */
    .action-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .dl-btn {
      flex: 1;
      min-width: 160px;
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: opacity 0.2s;
    }
    .dl-btn:hover { opacity: 0.88; }
    .buy-btn {
      flex: 1;
      min-width: 140px;
      padding: 12px 20px;
      background: white;
      color: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .buy-btn:hover { background: color-mix(in srgb, var(--accent) 6%, white); }

    /* Other vertical navigation links */
    .other-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .visit-link {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
    .visit-link:hover { text-decoration: underline; }
    .other-buy-link {
      font-size: 0.88rem;
      font-weight: 500;
      color: #6b7280;
      text-decoration: none;
    }
    .other-buy-link:hover { color: #374151; text-decoration: underline; }

    /* Setup steps */
    .setup-steps {
      background: color-mix(in srgb, var(--accent) 5%, white);
      border: 1px solid color-mix(in srgb, var(--accent) 18%, white);
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 16px;
    }
    .setup-steps p { font-weight: 600; color: var(--accent); margin-bottom: 6px; font-size: 0.875rem; }
    .setup-steps ol { padding-left: 18px; color: #374151; font-size: 0.85rem; line-height: 2; }

    /* No vertical card (not signed up) */
    .signup-nudge {
      background: #f9fafb;
      border: 2px dashed #e5e7eb;
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 20px;
      text-align: center;
    }
    .signup-nudge p { color: #6b7280; margin-bottom: 16px; }
    .signup-nudge a {
      display: inline-block;
      padding: 12px 28px;
      background: var(--accent);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .signup-nudge a:hover { opacity: 0.88; }

    /* Purchase history */
    .purchases-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .purchases-table th, .purchases-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    .purchases-table th { font-weight: 600; color: #374151; font-size: 0.85rem; text-transform: uppercase; }
    .purchases-table td { color: #374151; font-size: 0.9rem; }
    .invoice-link { color: var(--accent); text-decoration: none; font-weight: 500; }
    .invoice-link:hover { text-decoration: underline; }

    footer { padding: 40px 24px; text-align: center; color: #6b7280; font-size: 0.9rem; }
    footer a { color: #374151; text-decoration: none; margin: 0 8px; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      .license-box { flex-direction: column; align-items: flex-start; }
      .action-row { flex-direction: column; }
      .dl-btn, .buy-btn { min-width: unset; }
    }
  </style>
</head>
<body>

<div id="site-header"></div>
<script src="/header.js"></script>

<main>
  <div style="text-align:right;margin-bottom:8px;">
    <button id="logout-btn" class="logout-btn" onclick="logout()" style="display:none;">Log Out</button>
  </div>

  <!-- ── Login Section ── -->
  <div id="login-section">
    <div class="card">
      <h1>My Account</h1>
      <p class="subtitle">Log in to view your credits, purchase history, and RestaurantTasksAI setup links.</p>

      <div id="password-form">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        <label for="password" style="margin-top:14px;">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
        <button class="btn" onclick="loginWithPassword(this)">Log In</button>
        <p class="input-hint" style="text-align:center;margin-top:14px;">New here? <a href="/signup.html" style="color:var(--accent);font-weight:600;">Create a free account</a>.</p>
      </div>

      <div id="login-message" class="message"></div>
    </div>
  </div>

  <!-- ── Dashboard ── -->
  <div id="dashboard">

    <!-- Cards injected here by JS -->
    <div id="vertical-cards"></div>

    <!-- Purchase history -->
    <div class="card">
      <h2>Purchase History</h2>
      <table class="purchases-table">
        <thead>
          <tr><th>Date</th><th>Description</th><th>Credits</th><th>Invoice</th></tr>
        </thead>
        <tbody id="purchases-body">
          <tr><td colspan="4" style="text-align:center;color:#6b7280;">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

<footer>
  <p>© 2026 Laudo Lux, LLC &nbsp;·&nbsp;
    <a href="/terms.html">Terms</a> &nbsp;·&nbsp;
    <a href="/privacy.html">Privacy</a> &nbsp;·&nbsp;
    <a href="mailto:hello@restauranttasksai.com">hello@restauranttasksai.com</a>
  </p>
</footer>

<script>
  const API_BASE    = 'https://api.lawtasksai.com';
  const PRODUCT_ID  = 'restaurant';
  const STORAGE_KEY = 'restaurant_license_key';
  const ACCOUNT_EMAIL_KEY = 'restaurant_account_email';
  let currentLicenseKey = null;
  let userEmail = null;

  // ── Tab switching ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      _switchTab(tab.dataset.tab, tab);
    });
  });

  function _switchTab(name, clickedTab) {
    // Works on both the initial form and the dynamically restored form
    const container = clickedTab ? clickedTab.closest('.card') || document : document;
    container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    container.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    if (clickedTab) clickedTab.classList.add('active');
    const content = document.getElementById('tab-' + name);
    if (content) content.classList.add('active');
    hideMessage();
  }

  function showMessage(html, type) {
    const msg = document.getElementById('login-message');
    msg.innerHTML = html;
    msg.className = 'message ' + type;
  }
  function hideMessage() {
    const msg = document.getElementById('login-message');
    msg.className = 'message';
  }

  // ── Auto-login from localStorage / URL params ──
  window.onload = async function () {
    const params = new URLSearchParams(window.location.search);

    // Old magic-link URLs are no longer the primary login flow.
    const mlToken = params.get('token');
    if (mlToken) {
      window.history.replaceState({}, '', window.location.pathname);
      showMessage('Please log in with your email and password.', 'error');
      return;
    }

    // Direct license key param (legacy / installer flow)
    const keyParam = params.get('key') || params.get('license_key');
    if (keyParam) {
      currentLicenseKey = keyParam;
      localStorage.setItem(STORAGE_KEY, keyParam);
      loadDashboard();
      return;
    }

    // Saved key from previous session
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { currentLicenseKey = saved; loadDashboard(); }
  };

  // ── Traditional email/password login ──
  async function loginWithPassword(btn) {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showMessage('Please enter a valid email address.', 'error');
      return;
    }
    if (!password) {
      showMessage('Please enter your password.', 'error');
      return;
    }
    btn.disabled = true; btn.textContent = 'Logging in...';
    try {
      const res = await fetch(`${API_BASE}/auth/account-login?product=${encodeURIComponent(PRODUCT_ID)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Product-ID': PRODUCT_ID },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.licenses || !data.licenses.length) {
        throw new Error(data.detail || 'Invalid email or password.');
      }
      userEmail = data.email;
      localStorage.setItem(ACCOUNT_EMAIL_KEY, userEmail);
      const myLic = data.licenses.find(l => l.product_id === PRODUCT_ID) || data.licenses[0];
      if (myLic && myLic.license_key) {
        currentLicenseKey = myLic.license_key;
        localStorage.setItem(STORAGE_KEY, currentLicenseKey);
      }
      renderDashboard(data.licenses);
    } catch (e) {
      showMessage(e.message || 'Could not log in. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Log In';
    }
  }

  // ── Hidden legacy session loader for old account links and saved sessions ──
  async function loadDashboard() {
    const key = currentLicenseKey;
    if (!key) return;
    try {
      const balRes = await fetch(`${API_BASE}/v1/credits/balance`, {
        headers: { 'Authorization': `Bearer ${key}`, 'X-Product-ID': PRODUCT_ID }
      });
      if (!balRes.ok) {
        localStorage.removeItem(STORAGE_KEY);
        return;
      }
      const balData = await balRes.json();
      const fallbackCredits = balData.credits_balance || 0;

      const meRes = await fetch(`${API_BASE}/v1/me`, {
        headers: { 'Authorization': `Bearer ${key}`, 'X-Product-ID': PRODUCT_ID }
      });
      if (meRes.ok) {
        const me = await meRes.json();
        userEmail = me.email || null;
        if (userEmail) {
          // Step 3: Fetch all licenses for this email
          const licRes = await fetch(`${API_BASE}/auth/account-licenses`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail })
          });
          if (licRes.ok) {
            const licData = await licRes.json();
            renderDashboard(licData.licenses);
            return;
          }
        }
      }

      renderDashboard([{
        license_key: key,
        product_id: PRODUCT_ID,
        product_name: 'RestaurantTasksAI',
        product_domain: 'restauranttasksai.com',
        credits_remaining: fallbackCredits,
        license_type: balData.license_type || 'credits'
      }]);
    } catch (e) {
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  // ── Render dashboard with vertical cards ──
  function renderDashboard(licenses) {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('logout-btn').style.display = 'inline-block';

    const container = document.getElementById('vertical-cards');
    container.innerHTML = '';

    // Check if user has a license for the current vertical
    const myLic = licenses.find(l => l.product_id === PRODUCT_ID);

    // Current vertical card — always first
    if (myLic) {
      container.appendChild(buildCurrentCard(myLic));
    } else {
      container.appendChild(buildSignupNudge());
    }

    // Other verticals
    const others = licenses.filter(l => l.product_id !== PRODUCT_ID);
    if (others.length > 0) {
      const section = document.createElement('div');
      section.style.cssText = 'margin-top:8px;';
      const heading = document.createElement('p');
      heading.style.cssText = 'font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#9ca3af;margin-bottom:12px;';
      heading.textContent = 'Your other products';
      section.appendChild(heading);
      others.forEach(lic => section.appendChild(buildOtherCard(lic)));
      container.appendChild(section);
    }

    // Load purchase history using whichever key we have
    const keyForHistory = myLic ? myLic.license_key : (licenses[0] ? licenses[0].license_key : null);
    if (keyForHistory) loadPurchases(keyForHistory);
  }

  function buildCurrentCard(lic) {
    const el = document.createElement('div');
    el.className = 'vertical-card current';
    el.innerHTML = `
      <div class="card-header">
        <div class="card-title">${lic.product_name}</div>
        <span class="card-badge badge-current">You're here</span>
      </div>
      <div class="credits-row">
        <span class="credits-num">${lic.credits_remaining}</span>
        <span class="credits-label">credits remaining</span>
      </div>
      <div id="balance-message" style="display:none;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:8px;padding:10px 12px;margin:-4px 0 14px;color:#065f46;font-size:0.88rem;"></div>
      <div class="action-row">
        <button class="dl-btn" onclick="openInstallGuide()">Install from GitHub</button>
        <button class="buy-btn" style="border:0;cursor:pointer;" onclick="refreshCurrentBalance('${lic.license_key}', this)">Refresh Balance</button>
        <a href="/buy-credits.html" class="buy-btn">Buy More Credits</a>
      </div>
      <div id="mac-notice" style="display:none;background:#fffbeb;border:1px solid #f59e0b;border-radius:8px;padding:14px 16px;margin-bottom:14px;font-size:0.875rem;color:#92400e;">
        <strong>⚠️ Mac users:</strong> macOS may block the installer when you first open it. If you see a security warning:
        <ol style="margin:8px 0 0 18px;line-height:1.9;">
          <li><strong>Right-click</strong> (or Control+click) the downloaded file → select <strong>Open</strong> → click <strong>Open</strong> in the dialog.</li>
          <li>If that doesn't work: <strong>System Settings → Privacy &amp; Security</strong> → scroll down → click <strong>Open Anyway</strong>.</li>
        </ol>
        <p style="margin-top:8px;color:#b45309;">We're in the process of obtaining Apple code signing certification, which will eliminate this step entirely.</p>
      </div>
      <div class="setup-steps">
        <p>Quick setup</p>
        <ol>
          <li>Open the official GitHub install prompt</li>
          <li>Paste it into your AI assistant</li>
          <li>Approve the browser connection with your account email</li>
          <li>Restart your MCP client if the assistant tells you to</li>
        </ol>
        <p style="margin-top:8px;font-weight:400;"><a href="/install.html" style="color:var(--accent);">Official install page -></a></p>
      </div>
    `;
    return el;
  }

  function buildOtherCard(lic) {
    const el = document.createElement('div');
    el.className = 'vertical-card other';
    el.innerHTML = `
      <div class="card-header">
        <div class="card-title">${lic.product_name}</div>
        <span class="card-badge badge-other">${lic.license_type}</span>
      </div>
      <div class="credits-row">
        <span class="credits-num" style="font-size:1.4rem;">${lic.credits_remaining}</span>
        <span class="credits-label">credits remaining</span>
      </div>
      <div class="other-actions">
        <a href="https://${lic.product_domain}/download.html" class="visit-link">
          Open ${lic.product_name} account →
        </a>
        <span style="color:#e5e7eb;margin:0 4px;">·</span>
        <a href="https://${lic.product_domain}/buy-credits.html" class="other-buy-link">
          Buy credits
        </a>
      </div>
    `;
    return el;
  }

  function buildSignupNudge() {
    const el = document.createElement('div');
    el.className = 'signup-nudge';
    el.innerHTML = `
      <p style="font-size:1.05rem;font-weight:600;color:#1a1a2e;margin-bottom:8px;">
        You don't have a RestaurantTasksAI account yet
      </p>
      <p>Your other products are shown below. Sign up for RestaurantTasksAI to get 5 free credits.</p>
      <a href="/signup.html">Get Started Free →</a>
    `;
    return el;
  }

  async function loadPurchases(licenseKey) {
    try {
      const res = await fetch(`${API_BASE}/v1/account/purchases`, {
        headers: { 'Authorization': `Bearer ${licenseKey}`, 'X-Product-ID': PRODUCT_ID }
      });
      if (res.ok) {
        renderPurchases(await res.json());
      } else {
        document.getElementById('purchases-body').innerHTML =
          '<tr><td colspan="4" style="text-align:center;color:#6b7280;">No purchase history available.</td></tr>';
      }
    } catch (e) {
      document.getElementById('purchases-body').innerHTML =
        '<tr><td colspan="4" style="text-align:center;color:#6b7280;">Could not load purchases.</td></tr>';
    }
  }

  function renderPurchases(purchases) {
    const tbody = document.getElementById('purchases-body');
    if (!purchases || !purchases.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#6b7280;">No purchases yet.</td></tr>';
      return;
    }
    tbody.innerHTML = purchases.map(p => `
      <tr>
        <td>${new Date(p.date).toLocaleDateString()}</td>
        <td>${p.description}</td>
        <td>+${p.credits}</td>
        <td>${p.invoice_url ? `<a href="${p.invoice_url}" target="_blank" class="invoice-link">Download</a>` : '—'}</td>
      </tr>
    `).join('');
  }

  function copyKey(key, btn) {
    navigator.clipboard.writeText(key);
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  }

  async function refreshCurrentBalance(licenseKey, btn) {
    const original = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Checking…';
    try {
      const res = await fetch(`${API_BASE}/v1/credits/balance`, {
        headers: { 'Authorization': `Bearer ${licenseKey}`, 'X-Product-ID': PRODUCT_ID }
      });
      if (!res.ok) throw new Error('balance unavailable');
      const data = await res.json();
      const num = document.querySelector('.vertical-card.current .credits-num');
      if (num) num.textContent = data.credits_balance || 0;
      const msg = document.getElementById('balance-message');
      if (msg) {
        msg.textContent = `Your current balance is ${data.credits_balance || 0} credits.`;
        msg.style.display = 'block';
      }
    } catch (e) {
      const msg = document.getElementById('balance-message');
      if (msg) {
        msg.textContent = 'Could not refresh your balance. Please try again.';
        msg.style.display = 'block';
        msg.style.background = '#fef2f2';
        msg.style.borderColor = '#fecaca';
        msg.style.color = '#991b1b';
      }
    }
    btn.disabled = false;
    btn.textContent = original;
  }

  function openInstallGuide() {
    window.location.href = '/install.html';
  }

  function logout() {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(ACCOUNT_EMAIL_KEY);
    currentLicenseKey = null;
    userEmail = null;
    document.getElementById('login-section').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
    document.getElementById('vertical-cards').innerHTML = '';
  }
</script>

</body>
</html>
